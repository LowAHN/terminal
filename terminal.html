<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #050810;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
  }

  .terminal {
    display: flex;
    flex-direction: column;
    height: 100%;
    border: 1px solid #1a2540;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,245,255,0.05);
  }

  /* нғҖмқҙнӢҖ л°” */
  .titlebar {
    background: #0a0f1c;
    border-bottom: 1px solid #1a2540;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    user-select: none;
  }
  .dots { display: flex; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }
  .bar-title { flex: 1; text-align: center; font-size: 11px; color: #5a6e99; }
  .bar-title b { color: #00f5ff; }

  /* мғҒнғңл°” */
  .statusbar {
    background: #0d1320;
    border-bottom: 1px solid #1a2540;
    padding: 5px 18px;
    display: flex;
    gap: 20px;
    font-size: 11px;
    color: #2a3550;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .statusbar::-webkit-scrollbar { display: none; }
  .s-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .s-dot { width: 5px; height: 5px; border-radius: 50%; background: #00FFB2; box-shadow: 0 0 5px #00FFB2; animation: pulse 2s infinite; }
  .green { color: #00FFB2; }
  .cyan  { color: #00f5ff; }
  .gold  { color: #ffd60a; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* м¶ңл Ҙ */
  .output {
    flex: 1;
    background: #050810;
    padding: 14px 18px 0;
    overflow-y: auto;
    font-size: 12.5px;
    line-height: 1.8;
    scroll-behavior: smooth;
  }
  .output::-webkit-scrollbar { width: 3px; }
  .output::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 2px; }

  .line { margin-bottom: 1px; animation: lineIn 0.1s ease both; }
  .blank { height: 7px; }
  .prompt-line { display: flex; gap: 8px; }
  @keyframes lineIn { from{opacity:0;transform:translateX(-3px)} to{opacity:1;transform:translateX(0)} }

  .ps1 { white-space: nowrap; color: #7b2fff; }
  .ps1 .h { color: #00f5ff; }
  .ps1 .s { color: #2a3550; }
  .ps1 .p { color: #00FFB2; }
  .cmd { color: #e2eaff; }

  /* мһ…л Ҙ */
  .inputbar {
    background: #050810;
    border-top: 1px solid #1a2540;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #cmd {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e2eaff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    caret-color: #00f5ff;
  }
  #cmd::placeholder { color: #2a3550; }

  /* нһҢнҠё */
  .hintbar {
    background: #080d1a;
    border-top: 1px solid #1a2540;
    padding: 6px 18px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .hint {
    font-size: 10.5px;
    color: #2a3550;
    border: 1px solid #1a2540;
    padding: 2px 9px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .hint:hover { color: #00f5ff; border-color: #00f5ff; background: rgba(0,245,255,0.06); }

  .tbl-key { color: #00FFB2; display: inline-block; min-width: 110px; }
  .tbl-val { color: #5a6e99; }
  .help-cmd { color: #00f5ff; display: inline-block; min-width: 150px; }
  .help-desc { color: #5a6e99; }

  @media (max-width: 768px) {
    .terminal { border: none; border-radius: 0; }
    .terminal-body, .output { font-size: 2.8vw; padding: 10px 10px; }
    .titlebar { padding: 6px 10px; }
    .statusbar { padding: 4px 10px; font-size: 2.4vw; }
    .inputbar { padding: 8px 10px; }
    .hintbar { padding: 5px 10px; }
    .hint { font-size: 2.3vw; padding: 2px 6px; }
    .line { word-break: break-all; overflow-wrap: anywhere; white-space: pre-wrap; }
    .prompt-line { flex-wrap: wrap; }
    .bar-title { font-size: 2.4vw; }
    #cmd { font-size: 2.8vw; }
    .output { overflow-x: hidden; word-break: break-all; }
    .tbl-key { min-width: 60px; font-size: 2.6vw; }
    .tbl-val { font-size: 2.6vw; word-break: break-all; }
    .help-cmd { min-width: 80px; font-size: 2.5vw; }
    .help-desc { font-size: 2.5vw; }
    .ps1 { font-size: 2.4vw; }
    .cmd { word-break: break-all; }
  }
</style>
</head>

var hist       = [];
var histIdx    = -1;
var startTs    = Date.now();
var _postCache = [];

// в”Җв”Җ л ҢлҚ” н•ЁмҲҳ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function append(lines) {
  var out = document.getElementById('output');
  lines.forEach(function(l, i) {
    var el = document.createElement('div');
    el.style.animationDelay = (i * 22) + 'ms';

    if (!l.c && (l.v === '' || l.v === undefined)) {
      el.className = 'blank';
    } else if (l.c === 'tbl') {
      el.className = 'line';
      el.innerHTML = '<span class="tbl-key">' + l.k + '</span>' +
                     '<span class="tbl-val">' + l.d + '</span>';
    } else if (l.c === 'link') {
      el.className = 'line';
      el.style.color = '#5a6e99';
      el.style.cursor = 'pointer';
      el.textContent = l.v || '';
      el.addEventListener('mouseenter', function() { this.style.color = '#00f5ff'; this.style.textDecoration = 'underline'; });
      el.addEventListener('mouseleave', function() { this.style.color = '#5a6e99'; this.style.textDecoration = 'none'; });
      (function(url) { el.addEventListener('click', function() { if (url) window.open(url, '_blank'); }); })(l.url);
    } else if (l.c === 'help') {
      el.className = 'line';
      el.innerHTML = '<span style="color:#1a2540;">в”Ӯ</span>  ' +
                     '<span class="help-cmd">' + l.cmd + '</span>' +
                     '<span class="help-desc">' + l.desc + '</span>';
    } else if (l.c === 'colors') {
      el.className = 'line';
      var cols = ['#ff5f57','#febc2e','#28c840','#00f5ff','#7b2fff','#ff3d71','#ffd60a','#00FFB2'];
      el.innerHTML = cols.map(function(c) {
        return '<span style="background:' + c + ';color:' + c + ';border-radius:2px;padding:0 8px;margin-right:3px;">в–Ҳв–Ҳ</span>';
      }).join('');
    } else {
      el.className = 'line';
      el.style.color = l.c || '#5a6e99';
      el.textContent = l.v || '';
    }
    out.appendChild(el);
  });
  out.scrollTop = out.scrollHeight;
}

function addPrompt(cmd) {
  var out = document.getElementById('output');
  var el = document.createElement('div');
  el.className = 'line prompt-line';
  el.innerHTML =
    '<span class="ps1"><span class="h">endoflinux</span><span class="s">@blog:</span>' +
    '<span class="p">' + curPath + '</span><span class="s"> $</span></span> ' +
    '<span class="cmd">' + cmd + '</span>';
  out.appendChild(el);
  out.scrollTop = out.scrollHeight;
}

// в”Җв”Җ лӘ…л №м–ҙ мӢӨн–ү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function run(raw) {
  var cmd = (raw || '').trim();
  if (!cmd) return;

  hist.unshift(cmd);
  histIdx = -1;
  document.getElementById('cmd').value = '';

  addPrompt(cmd);

  // ls
  if (cmd === 'ls' || cmd.indexOf('ls ') === 0) {
    var target = cmd === 'ls' ? curPath : '~/' + cmd.split(' ')[1];
    var files = FS[target] || FS[curPath] || [];
    if (!files.length) { append([{c:'#2a3550', v:'(empty)'}]); return; }
    append(files.map(function(f) {
      return { c: f.endsWith('/') ? '#00f5ff' : f.startsWith('.') ? '#2a3550' : '#00FFB2', v: f };
    }));
    return;
  }

  // cd
  if (cmd.indexOf('cd ') === 0) {
    var dir = cmd.split(' ')[1];
    if (dir === '~' || !dir) {
      curPath = '~';
    } else if (dir === '..') {
      curPath = curPath.indexOf('/') > -1 ? curPath.split('/').slice(0,-1).join('/') : '~';
    } else {
      var np = curPath === '~' ? '~/' + dir : curPath + '/' + dir;
      if (FS[np]) { curPath = np; }
      else { append([{c:'#ff3d71', v:'cd: ' + dir + ': No such file or directory'}]); return; }
    }
    document.getElementById('curpath').textContent = curPath;
    return;
  }

  // cat
  if (cmd.indexOf('cat ') === 0) {
    var fname = cmd.split(' ')[1];
    if (FILES[fname]) { append(FILES[fname]); return; }
    append([{c:'#ff3d71', v:'cat: ' + fname + ': No such file or directory'}]);
    return;
  }

  // open
  if (cmd.indexOf('open ') === 0) {
    var num = parseInt(cmd.split(' ')[1]);
    if (!_postCache.length) {
      append([{c:'#ff3d71', v:'open: git log лҘј лЁјм Җ мӢӨн–үн•ҳм„ёмҡ”.'}]);
      return;
    }
    if (isNaN(num) || num < 1 || num > _postCache.length) {
      append([{c:'#ff3d71', v:'open: 1~' + _postCache.length + ' мӮ¬мқҙ лІҲнҳёлҘј мһ…л Ҙн•ҳм„ёмҡ”.'}]);
      return;
    }
    var post = _postCache[num - 1];
    append([
      {c:'#00FFB2', v:'Opening: ' + post.title},
      {c:'#2a3550', v:post.url},
    ]);
    if (post.url) window.open(post.url, '_blank');
    return;
  }

  // clear
  if (cmd === 'clear') {
    document.getElementById('output').innerHTML = '';
    return;
  }

  // л“ұлЎқ лӘ…л №м–ҙ
  var fn = CMDS[cmd];
  if (fn) {
    var result = fn();
    if (result === '__clear__') { document.getElementById('output').innerHTML = ''; }
    else if (result === '__async__') { /* л№„лҸҷкё° лӘ…л №м–ҙ - appendлҠ” лӮҙл¶Җм—җм„ң мІҳлҰ¬ */ }
    else { append(result); }
    return;
  }

  // not found
  append([
    {c:'#ff3d71', v:'command not found: ' + cmd},
    {c:'#2a3550', v:"hint: 'help' лҘј мһ…л Ҙн•ҙліҙм„ёмҡ”."},
  ]);
}

// в”Җв”Җ нӮӨліҙл“ң мқҙлІӨнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('cmd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    run(this.value);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < hist.length - 1) { histIdx++; this.value = hist[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; this.value = hist[histIdx]; }
    else { histIdx = -1; this.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    var v = this.value;
    var parts = v.split(' ');
    if (parts.length >= 2) {
      // нҢҢмқјлӘ…/л””л үнҶ лҰ¬ мһҗлҸҷмҷ„м„ұ
      var base = parts[0];
      var partial = parts.slice(1).join(' ');
      var items = [];
      if (base === 'cat') {
        items = Object.keys(FILES);
      } else if (base === 'ls' || base === 'cd') {
        var dirs = Object.keys(FS);
        items = (FS[curPath] || []).filter(function(f) { return f.endsWith('/'); }).map(function(f) { return f.replace('/',''); });
      } else {
        items = (FS[curPath] || []);
      }
      var match = items.find(function(f) { return f.indexOf(partial) === 0 && f !== partial; });
      if (match) this.value = base + ' ' + match;
    } else {
      // лӘ…л №м–ҙ мһҗлҸҷмҷ„м„ұ
      var all = Object.keys(CMDS).concat(['ls','cd','cat','clear']);
      var m = all.find(function(c) { return c.indexOf(v) === 0 && c !== v; });
      if (m) this.value = m;
    }
  }
});

// н„°лҜёл„җ нҒҙлҰӯмӢң нҸ¬м»ӨмҠӨ
document.querySelector('.terminal').addEventListener('click', function() {
  document.getElementById('cmd').focus();
});

// в”Җв”Җ м—…нғҖмһ„ & лЎңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
setInterval(function() {
  var s = Math.floor((Date.now() - startTs) / 1000);
  var h = Math.floor(s / 3600).toString().padStart(2,'0');
  var m = Math.floor((s % 3600) / 60).toString().padStart(2,'0');
  var sec = (s % 60).toString().padStart(2,'0');
  document.getElementById('uptime').textContent = h + ':' + m + ':' + sec;
  document.getElementById('load').textContent = (0.2 + Math.random() * 0.5).toFixed(2);
}, 1000);

// в”Җв”Җ л¶ҖнҢ… л©”мӢңм§Җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
append([
  {c:'#00f5ff', v:'EndofLinux OS v2026.03 (Kernel 6.7.0-endoflinux)'},
  {c:'#2a3550', v:'Booting DevOps environment...'},
  {c:'',v:''},
  {c:'#00FFB2', v:'[  OK  ] Kubernetes cluster connected'},
  {c:'#00FFB2', v:'[  OK  ] Terraform state loaded'},
  {c:'#00FFB2', v:'[  OK  ] ArgoCD sync complete'},
  {c:'#00FFB2', v:'[  OK  ] Blog server deployed'},
  {c:'',v:''},
  {c:'#ffd60a', v:'  вҡЎ нҷҳмҳҒн•©лӢҲлӢӨ! лӘ…л №м–ҙлҘј м§Ғм ‘ мһ…л Ҙн•ҙліҙм„ёмҡ”.'},
  {c:'#2a3550', v:'  вҶ‘вҶ“ нһҲмҠӨнҶ лҰ¬   Tab мһҗлҸҷмҷ„м„ұ   help лӘ…л №м–ҙ лӘ©лЎқ'},
  {c:'',v:''},
]);
document.getElementById('cmd').focus();
</script>
